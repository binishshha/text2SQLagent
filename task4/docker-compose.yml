services:
  db:
    image: postgres:16-alpine
    container_name: text_to_sql_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-classicmodels}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-classicmodels}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: text_to_sql_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-classicmodels}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  streamlit:
    build: .
    container_name: text_to_sql_streamlit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_URL: http://api:8000/query
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-classicmodels}
    command: ["streamlit", "run", "streamlit_app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:

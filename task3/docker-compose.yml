version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: classicmodels
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../seed.sql:/docker-entrypoint-initdb.d/seed.sql

  streamlit:
    build: .
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/classicmodels
      GENIMI_API_KEY: ${GENIMI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
    depends_on:
      - postgres

volumes:
  postgres_data:
